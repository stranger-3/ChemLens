<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structure | ChemLens</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

<nav class="flex justify-between items-center px-8 py-6">
    <div class="text-2xl font-bold text-slate-800 flex items-center gap-2">
        <span class="text-blue-600">●</span> ChemLens
    </div>
    <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-blue-600">← Back Home</a>
</nav>

<main class="flex-grow px-8 py-10 flex flex-col items-center">
    <h2 id="compoundName" class="text-3xl font-bold mb-6">Finding Compound...</h2>
    <div class="bg-white p-4 rounded-xl shadow-lg border">
        <img id="compoundStructure" src="" alt="Structure Loading..." class="max-w-xs md:max-w-md">
    </div>
</main>

<script>
const compounds = [
    {id: "Water", name: "Water", formula: "H2O", structure: "https://thfvnext.bing.com/th/id/OIP.07phcPkTW6gAF4Q52ZRUBAHaFi?w=252&h=188&c=7&r=0&o=7&cb=thfvnext&dpr=1.3&pid=1.7&rm=3"},
    {id: "Glucose", name: "Glucose", formula: "C6H12O6", structure: "https://thfvnext.bing.com/th/id/OIP.2vh__W3OZ_977CYAsUvl8wHaHB?w=189&h=180&c=7&r=0&o=7&cb=thfvnext&dpr=1.3&pid=1.7&rm=3"},
    {id: "Benzene", name: "Benzene", formula: "C6H6", structure: "https://thfvnext.bing.com/th/id/OIP.Cqq1jyCs0sB5BfS2f6PtswHaGw?w=177&h=180&c=7&r=0&o=7&cb=thfvnext&dpr=1.3&pid=1.7&rm=3"}
    {id: "Sulfuric Acid", name: "Sulfuric Acid", formula: "H2SO4", structure: "https://thfvnext.bing.com/th/id/OIP.j3RPAnmyeHrRfSkdAOXrmgHaEK?w=328&h=184&c=7&r=0&o=7&cb=thfvnext&dpr=1.3&pid=1.7&rm=3"}
];

// 1. Get the ID from the URL (e.g., structure.html?id=Benzene)
const urlParams = new URLSearchParams(window.location.search);
const compoundId = urlParams.get('id');

// 2. Find that compound in our list
const compound = compounds.find(c => c.id === compoundId) || compounds[0];

// 3. Force the update
document.getElementById("compoundName").innerText = `${compound.name} (${compound.formula})`;
document.getElementById("compoundStructure").src = compound.structure;

// 4. Check for link blocks
document.getElementById("compoundStructure").onerror = function() {
    this.src = "https://via.placeholder.com/300x300?text=Image+Blocked+By+Browser";
};
</script>
</body>
</html>
